name: daily-bots

# Drips new bot-subscribers into the database across the day. The cron fires
# roughly once an hour; each run adds only a slice of the day's randomly-chosen
# target (see scripts/daily-bots.mjs), so users trickle in over 24h instead of
# all at once. `workflow_dispatch` lets an admin trigger a run by hand too.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# The daily count / on-off switch are NOT set here — they live in the
# app_config table and are editable from the admin dashboard → Bots tab.

on:
  schedule:
    # Minute 7 of every hour (UTC). The offset avoids the top-of-hour crowd,
    # which GitHub delays most heavily.
    - cron: "7 * * * *"
  workflow_dispatch:

# If a run is still going when the next hour fires, let the new one wait rather
# than overlap (overlap is safe — it only adds the shortfall — but serial is tidier).
concurrency:
  group: daily-bots
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Add today's slice of bot-subscribers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/daily-bots.mjs
